<div class="tela-autenticacao">
  <div class="posicao-voltar">
    <a routerLink="/login" class="link-voltar"
      ><i class="fas fa-arrow-left"></i
    ></a>
  </div>

  <div class="coluna-central-larga">
    <div class="logotipo-central">
      <img src="assets/img/logobranco.png" alt="BIGODE" />
    </div>

    <div class="cartao-autenticacao">
      <h2 class="titulo-autenticacao">Criar Conta</h2>

      <form (ngSubmit)="onSubmit()">
        <div class="grade-formulario">
          <div class="campo-formulario">
            <label for="email">EMAIL</label>
            <div class="caixa-input">
              <span class="icone-input"><i class="fas fa-envelope"></i></span>
              <input
                type="email"
                id="email"
                name="email"
                [(ngModel)]="email"
                required
                placeholder="seu@email.com"
              />
            </div>
          </div>
          <div class="campo-formulario">
            <label for="senha">SENHA</label>
            <div class="caixa-input">
              <span class="icone-input"><i class="fas fa-lock"></i></span>
              <input
                type="password"
                id="senha"
                name="senha"
                [(ngModel)]="senha"
                required
                placeholder="******"
              />
            </div>
          </div>
          <div class="campo-formulario">
            <label for="celular">CELULAR</label>
            <div class="caixa-input">
              <span class="icone-input"><i class="fas fa-mobile-alt"></i></span>
              <input
                type="tel"
                id="celular"
                name="celular"
                [(ngModel)]="celular"
                required
                placeholder="(00) 00000-0000"
              />
            </div>
          </div>
          <div class="campo-formulario">
            <label for="cpf">CPF</label>
            <div class="caixa-input">
              <span class="icone-input"><i class="fas fa-id-card"></i></span>
              <input
                type="text"
                id="cpf"
                name="cpf"
                [(ngModel)]="cpf"
                required
                placeholder="000.000.000-00"
              />
            </div>
          </div>
        </div>
        <button type="submit" class="botao-primario-grande">Cadastrar</button>
      </form>

      <div class="rodape-cartao">
        <span>Já tem uma conta?</span>
        <a routerLink="/login">Faça login</a>
      </div>
    </div>
  </div>
</div>
