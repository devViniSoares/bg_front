<div class="tela-autenticacao">
  <div class="posicao-voltar">
    <a routerLink="/login" class="link-voltar"
      ><i class="fas fa-arrow-left"></i
    ></a>
  </div>

  <div class="coluna-central-larga">
    <div class="logotipo-central">
      <img src="assets/img/logobranco.png" alt="BIGODE" />
    </div>

    <div class="cartao-autenticacao">
      <h2 class="titulo-autenticacao">Criar Conta</h2>

      <form (ngSubmit)="onSubmit()">
        <div class="grade-formulario">
          <div class="campo-formulario">
            <label for="nome">NOME</label>
            <div class="caixa-input">
              <span class="icone-input"><i class="fas fa-user"></i></span>
              <input
                type="text"
                id="nome"
                name="nome"
                [(ngModel)]="nome"
                required
                placeholder="Seu nome completo"
              />
            </div>
          </div>
          <div class="campo-formulario">
            <label for="email">EMAIL</label>
            <div class="caixa-input">
              <span class="icone-input"><i class="fas fa-envelope"></i></span>
              <input
                type="email"
                id="email"
                name="email"
                [(ngModel)]="email"
                required
                placeholder="seu@email.com"
              />
            </div>
          </div>
          <div class="campo-formulario">
            <label for="senha">SENHA</label>
            <div class="caixa-input">
              <span class="icone-input"><i class="fas fa-lock"></i></span>
              <input
                type="password"
                id="senha"
                name="senha"
                [(ngModel)]="senha"
                required
                placeholder="******"
              />
            </div>
          </div>
        </div>
          <p *ngIf="erro" style="color:#e74c3c;font-size:0.85rem;margin:0.5rem 0;">{{ erro }}</p>
          <p *ngIf="sucesso" style="color:#27ae60;font-size:0.85rem;margin:0.5rem 0;">{{ sucesso }}</p>
        <button type="submit" class="botao-primario-grande" [disabled]="loading">{{ loading ? 'Cadastrando...' : 'Cadastrar' }}</button>
      </form>

      <div class="rodape-cartao">
        <span>Já tem uma conta?</span>
        <a routerLink="/login">Faça login</a>
      </div>
    </div>
  </div>
</div>
